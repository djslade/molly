services:
  recipesdb:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - recipesdbvol:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  gateway:
    image: fenroe/molly-gateway:latest
    env_file: .env
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
  recipes:
    image: fenroe/molly-recipes:latest
    env_file: .env
    pull_policy: always
    ports:
      - 334:3000
    depends_on:
      server:
        condition: service_started
  web:
    image: fenroe/molly-web:latest
    env_file: .env
    pull_policy: always
    ports:
      - 333:3000
    depends_on:
      server:
        condition: service_started
volumes:
  recipesdbvol:
